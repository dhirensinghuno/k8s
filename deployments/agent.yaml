apiVersion: v1
kind: Namespace
metadata:
  name: k8s-sre
  labels:
    app: k8s-sre
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-sre-agent
  namespace: k8s-sre
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-sre-agent
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/eviction", "events", "services", "endpoints", "persistentvolumeclaims", "nodes"]
  verbs: ["get", "list", "watch", "describe"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["delete", "patch"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["update", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "describe"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["update", "patch", "get"]
- apiGroups: ["policy"]
  resources: ["poddisruptionbudgets", "evictions"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-sre-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-sre-agent
subjects:
- kind: ServiceAccount
  name: k8s-sre-agent
  namespace: k8s-sre
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-sre-config
  namespace: k8s-sre
data:
  config.yaml: |
    poll_interval: 10s
    enable_auto_remediation: true
    enable_auto_rollback: true
    memory_increase_percent: 25
    rollback_threshold: 15m
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-sre-agent
  namespace: k8s-sre
  labels:
    app: k8s-sre
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-sre
  template:
    metadata:
      labels:
        app: k8s-sre
    spec:
      serviceAccountName: k8s-sre-agent
      containers:
      - name: agent
        image: k8s-sre/agent:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: k8s-sre-config
              key: db_host
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: k8s-sre-config
              key: db_port
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: k8s-sre-config
              key: db_name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: k8s-sre-db-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: k8s-sre-db-credentials
              key: password
        - name: ENABLE_DB
          value: "true"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-sre-agent
  namespace: k8s-sre
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: k8s-sre
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k8s-sre-agent
  namespace: k8s-sre
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: k8s-sre.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: k8s-sre-agent
            port:
              number: 80
---
apiVersion: v1
kind: Secret
metadata:
  name: k8s-sre-db-credentials
  namespace: k8s-sre
type: Opaque
stringData:
  username: postgres
  password: your-secure-password
